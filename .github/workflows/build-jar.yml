name: Build Fabric JAR

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          gradle tasks --no-daemon
          gradle build remapJar --no-daemon || gradle build --no-daemon

      - name: Find jars
        run: find . -type f -name "*.jar" | sort

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: yakusha-client-jar
          path: |
            **/build/libs/*.jar
            **/build/libs/*-all.jar
          if-no-files-found: error

name: Build Fabric JAR

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build --no-daemon

      - name: Show outputs
        run: |
          ls -la
          ls -la build || true
          ls -la build/libs || true

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: yakusha-client-jar
          path: build/libs/*.jar
          if-no-files-found: warn

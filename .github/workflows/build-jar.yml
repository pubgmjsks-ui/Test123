name: Build Fabric JAR

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Debug project tree
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f \( -name "build.gradle" -o -name "settings.gradle" -o -name "fabric.mod.json" \) | sort

      - name: Build attempt
        run: |
          gradle --version
          gradle tasks --all --no-daemon
          gradle build --stacktrace --no-daemon || true
          gradle remapJar --stacktrace --no-daemon || true

      - name: Find jars
        run: |
          find . -type f -name "*.jar" | sort

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: yakusha-client-jar
          path: |
            **/*.jar
          if-no-files-found: error

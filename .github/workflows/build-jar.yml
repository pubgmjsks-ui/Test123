name: Build Fabric JAR

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod jar
        run: gradle clean build remapJar --no-daemon

      - name: Show build outputs
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== BUILD ==="
          ls -la build || true
          echo "=== BUILD/LIBS ==="
          ls -la build/libs || true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: yakusha-client-jar
          path: |
            build/libs/*-all.jar
            build/libs/*.jar
          if-no-files-found: error

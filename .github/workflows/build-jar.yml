- name: Build (strict)
  run: |
    set -e
    gradle --version
    gradle tasks --all --no-daemon
    gradle build --stacktrace --no-daemon
    gradle remapJar --stacktrace --no-daemon

- name: Print tree
  if: always()
  run: |
    echo "=== ROOT ==="
    ls -la
    echo "=== FIND BUILD.GRADLE ==="
    find . -maxdepth 4 -name "build.gradle" -o -name "settings.gradle" -o -name "fabric.mod.json"
    echo "=== FIND JARS ==="
    find . -type f -name "*.jar" | sort

- name: Upload JAR
  uses: actions/upload-artifact@v4
  with:
    name: yakusha-client-jar
    path: |
      **/build/libs/*.jar
      **/build/libs/*-all.jar
    if-no-files-found: error
